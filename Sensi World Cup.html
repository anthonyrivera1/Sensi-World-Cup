<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #38bdf8;        /* electric blue */
    --pitch: #10b981;         /* pitch green */
    --glass-alpha: 0.05;
    --glass-blur: 12px;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background:
      radial-gradient(1200px 700px at 78% -8%, rgba(56,189,248,.14), transparent 60%),
      radial-gradient(1000px 700px at 8% 4%, rgba(16,185,129,.12), transparent 55%),
      #070b16;
    background-attachment: fixed;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, .display { font-family: 'Archivo', 'Plus Jakarta Sans', sans-serif; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @media (min-width: 420px) { .xs\:inline { display: inline; } }

  /* ---- animation toolkit (CSS, no JS lib) ---- */
  .press { transition: transform .13s ease; }
  .press:active { transform: scale(.93); }
  .lift { transition: transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s ease, border-color .2s ease; }
  .lift:hover { transform: translateY(-4px); }
  .hscale { transition: transform .16s cubic-bezier(.34,1.4,.64,1); }
  .hscale:hover { transform: scale(1.05); }
  .hscale:active { transform: scale(.9); }

  @keyframes fadeUp { from { transform: translateY(12px); } to { transform: translateY(0); } }
  .fade-up { animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
  @keyframes fadeIn { from { transform: translateY(4px); } to { transform: none; } }
  .fade-in { animation: fadeIn .3s ease both; }
  @keyframes popIn { from { transform: scale(.6); } to { transform: scale(1); } }
  .pop-in { animation: popIn .34s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes numRoll { from { transform: translateY(-13px); } to { transform: translateY(0); } }
  .num-roll { animation: numRoll .3s cubic-bezier(.22,1,.36,1); }
  @keyframes floatUp { 0% { opacity: 0; transform: translateY(0) scale(.6); } 22% { opacity: 1; } 100% { opacity: 0; transform: translateY(-46px) scale(1.35); } }
  .float-up { animation: floatUp 1s ease forwards; }
  @keyframes glowPulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } 38% { box-shadow: 0 0 0 3px rgba(16,185,129,.75); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
  .glow-pulse { animation: glowPulse .75s ease; }
  @keyframes modalIn { from { transform: translateY(26px) scale(.96); } to { transform: none; } }
  .modal-in { animation: modalIn .34s cubic-bezier(.34,1.3,.64,1) both; }
  @keyframes modalOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(14px) scale(.97); } }
  .modal-out { animation: modalOut .2s ease both; }
  @keyframes ballDrift { 0% { transform: translate(14px,10px); } 25% { transform: translate(72px,40px); } 50% { transform: translate(40px,20px); } 75% { transform: translate(60px,12px); } 100% { transform: translate(14px,30px); } }
  .ball-drift { animation: ballDrift 6s ease-in-out infinite; }
  @keyframes wiggle { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-12deg); } 75% { transform: rotate(12deg); } }
  .wiggle { animation: wiggle .5s ease; }

  /* collapsible (grid-rows trick) */
  .collapsible { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .32s cubic-bezier(.22,1,.36,1); }
  .collapsible.open { grid-template-rows: 1fr; }
  .collapsible > .collapsible-inner { overflow: hidden; min-height: 0; }

  /* progress ring transition */
  .ring-arc { transition: stroke-dashoffset .9s cubic-bezier(.22,1,.36,1); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

  tailwind.config = { theme: { extend: { screens: { xs: '420px' } } } };
